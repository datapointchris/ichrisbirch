name: Validate Project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# These permissions are needed to interact with GitHub's OIDC Token endpoint.
permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: "testing"

defaults:
  run:
    shell: bash

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            python:
              - 'ichrisbirch/**'
              - 'tests/**'
              - 'scripts/**'
              - 'secrets/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'alembic.ini'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'secrets/**'
              - '.github/workflows/**'
            docker:
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'deploy-containers/**'
              - '.github/workflows/**'

  # ── Python ──────────────────────────────────────────────────────

  lint-python:
    name: Lint Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0

      - name: Lint GitHub Actions workflow files
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color -shellcheck=""

      - name: Install UV
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Run ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"

      - name: Run ruff format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

      - name: Run mypy
        run: uv run mypy ichrisbirch --install-types --non-interactive --config-file pyproject.toml

      - name: Run bandit
        run: uv run bandit -c pyproject.toml .

      - name: Minimize uv cache
        run: uv cache prune --ci

  test-python:
    name: Test Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0
        with:
          version: "3.12.2"

      - name: Decrypt testing secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops decrypt secrets/secrets.test.enc.env > .env

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: "latest"

      - name: Install UV
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen --group test

      - name: Get Playwright Version for Cache
        run: |
          PLAYWRIGHT_VERSION=$(uv run playwright --version | grep -oE '[0-9.]+')
          echo "PLAYWRIGHT_VERSION=$PLAYWRIGHT_VERSION" >> "$GITHUB_ENV"

      # Cache browser binaries, cache key is based on Playwright version and OS
      - name: Cache Playwright Browser Binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: "~/.cache/ms-playwright"
          key: "ubuntu-24.04-3.13-playwright-${{ env.PLAYWRIGHT_VERSION }}"
          restore-keys: |
            ubuntu-24.04-3.13-playwright-

      - name: Install Playwright Browsers
        run: uv run playwright install
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-${{ github.event.repository.name }}-role
          aws-region: ${{ vars.AWS_REGION }}

      - name: Create test logs directory
        run: mkdir -p test-logs

      - name: Create Docker network
        run: docker network create proxy || true

      - name: Start Docker Compose test environment
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml \
            --project-name icb-test up -d --build --wait --wait-timeout 120 postgres redis
          docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml \
            --project-name icb-test up -d --build --wait --wait-timeout 180 api chat scheduler

      - name: Initialize test database
        run: uv run python -m ichrisbirch.database.initialization --env testing --db-host localhost --db-port 5434

      - name: Run pytest with Coverage
        run: uv run pytest --cov=ichrisbirch

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml \
            --project-name icb-test down -v

      - name: Minimize uv cache
        run: uv cache prune --ci

  # ── Frontend ────────────────────────────────────────────────────

  lint-frontend:
    name: Lint Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier --check src/

      - name: Run TypeScript type check
        run: npm run typecheck

  test-frontend:
    name: Test Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run Vitest unit tests
        run: cd frontend && npm run test:unit

      - name: Install SOPS
        uses: mdgreenwald/mozilla-sops-action@v1.6.0
        with:
          version: "3.12.2"

      - name: Decrypt testing secrets
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: sops decrypt secrets/secrets.test.enc.env > .env

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: "latest"

      - name: Install UV
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install Python dependencies
        run: uv sync --frozen --group test

      - name: Generate self-signed TLS certs for Traefik
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout deploy-containers/traefik/certs/test.key \
            -out deploy-containers/traefik/certs/test.crt -days 1 -nodes \
            -subj "/CN=test.localhost" \
            -addext "subjectAltName=DNS:test.localhost,DNS:*.test.localhost,DNS:api.test.localhost,DNS:app.test.localhost"

      - name: Create Docker network
        run: docker network create proxy || true

      - name: Start test containers for E2E
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml \
            --project-name icb-test up -d --build --wait --wait-timeout 120 postgres redis
          docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml \
            --project-name icb-test up -d --build api vue traefik

      - name: Initialize test database
        run: uv run python -m ichrisbirch.database.initialization --env testing --db-host localhost --db-port 5434

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: cd frontend && npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop Docker Compose
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.ci.yml \
            --project-name icb-test down -v

  # ── Docker ──────────────────────────────────────────────────────

  test-production-build:
    name: Test Production Build
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-24.04
    # This job tests that the production Docker build works correctly.
    # It catches issues like the shared image race condition that only
    # manifest in production builds (not dev/test which use bind mounts).

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: "latest"

      - name: Build production images
        run: |
          echo "Building production images (same as prod rebuild)..."
          docker compose -f docker-compose.yml build
          echo "Production build completed successfully"

      - name: Verify images exist
        run: |
          echo "Verifying production images were created..."
          docker images | grep -E "ichrisbirch|REPOSITORY"

      - name: Create Docker network
        run: docker network create proxy || true

      - name: Test production containers can start
        run: |
          echo "Testing production containers can start..."
          # Create minimal .env for production (services need these vars)
          cat > .env << 'EOF'
          POSTGRES_PASSWORD=testpass
          REDIS_PASSWORD=testpass
          DOMAIN=localhost
          EOF

          # Start just postgres and redis first (required by app services)
          docker compose -f docker-compose.yml up -d postgres redis
          echo "Waiting for database..."
          sleep 10

          # Start application services
          docker compose -f docker-compose.yml up -d api chat scheduler
          echo "Waiting for services to initialize..."
          sleep 15

          # Check all services are running
          echo "Checking container status..."
          docker compose -f docker-compose.yml ps

          # Verify no containers exited
          EXITED=$(docker compose -f docker-compose.yml ps --status exited -q | wc -l)
          if [ "$EXITED" -gt 0 ]; then
            echo "ERROR: Some containers exited unexpectedly"
            docker compose -f docker-compose.yml logs
            exit 1
          fi

          echo "All production containers started successfully"

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml down -v 2>/dev/null || true

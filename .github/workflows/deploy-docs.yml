name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "tools/docs/**"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "tools/docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install UV
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      # Build once (strict) for the homelab hub artifact + validation.
      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
          retention-days: 7

      # Public GitHub Pages copy.
      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force

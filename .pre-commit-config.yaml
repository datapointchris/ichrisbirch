fail_fast: true
default_stages: [pre-commit]
repos:
  # ============================================================
  # PHASE 1: Stats capture (MUST be first)
  # ============================================================
  - repo: local
    hooks:
      - id: devstats-capture
        name: devstats capture
        stages: [pre-commit]
        language: system
        entry: uv run python -m stats.pre_commit_capture
        pass_filenames: false
        always_run: true

  # ============================================================
  # PHASE 2: File format & basic checks
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: ^(mkdocs\.yml|docker-compose.*\.yml)$
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key

  - repo: local
    hooks:
      - id: docker-compose-validate
        name: validate docker compose files
        description: "Validate compose files using the actual Docker Compose parser"
        entry: bash -c 'docker compose -f docker-compose.yml config --quiet && docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet && docker compose -f docker-compose.test.yml config --quiet'
        language: system
        files: ^docker-compose.*\.yml$
        pass_filenames: false

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.8.3
    hooks:
      - id: uv-lock

  # ============================================================
  # PHASE 3: Language-specific linters & formatters
  # ============================================================
  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--toml", "pyproject.toml"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "."]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/dosisod/refurb
    rev: v2.3.0
    hooks:
      - id: refurb
        additional_dependencies: ["pydantic"]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
      - id: pyupgrade

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy ichrisbirch stats --install-types --non-interactive --config-file pyproject.toml
        language: system
        types: [python]
        pass_filenames: false

  # Shell
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck

  # Docker
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL4006"]

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args: ["--fix"]

  # HTML/Jinja templates
  - repo: https://github.com/djlint/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-jinja
        args: ["--reformat"]
      - id: djlint

  # Vue/Frontend (only run when frontend/package.json exists)
  - repo: local
    hooks:
      - id: vue-eslint
        name: eslint (vue)
        description: "Run ESLint on Vue/JS/TS files"
        entry: bash -c '[ ! -f frontend/package.json ] && exit 0; cd frontend && npm run lint:fix'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(vue|js|ts|jsx|tsx)$'
        stages: [pre-commit]

      - id: vue-prettier
        name: prettier (vue)
        description: "Run Prettier on frontend files"
        entry: bash -c '[ ! -f frontend/package.json ] && exit 0; cd frontend && npm run format'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(vue|js|ts|jsx|tsx|css|scss|json|md)$'
        stages: [pre-commit]

      - id: vue-typecheck
        name: typecheck (vue)
        description: "Run TypeScript type checking"
        entry: bash -c '[ ! -f frontend/package.json ] && exit 0; cd frontend && npm run typecheck'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(vue|ts|tsx)$'
        stages: [pre-commit]

      - id: vue-test-results
        name: vue tests (results capture)
        description: "Run Vitest unit tests and capture results for stats"
        entry: bash -c '[ ! -f frontend/package.json ] && exit 0; cd frontend && npm test; rc=$?; cd .. && uv run python -m stats.collect_report vitest; exit $rc'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(vue|ts|tsx)$'
        stages: [pre-commit]

      - id: vue-e2e-results
        name: vue e2e (results capture)
        description: "Run Playwright E2E tests and capture results for stats"
        entry: bash -c '[ ! -f frontend/package.json ] && exit 0; ./cli/ichrisbirch testing ensure && cd frontend && npx playwright test; rc=$?; cd .. && uv run python -m stats.collect_report playwright; exit $rc'
        language: system
        pass_filenames: false
        files: '^frontend/.*\.(vue|ts|tsx)$'
        stages: [pre-commit]

  # Terraform
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_validate
      - id: terraform_tflint
      - id: terraform_fmt
      - id: terraform_docs
        args:
          - --args=--anchor=false
          - --args=--html=false

  # GitHub Actions
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        args: ["-color", "-shellcheck="]

  # ============================================================
  # PHASE 4: Project-specific validations
  # ============================================================
  - repo: local
    hooks:
      - id: code-sync
        name: Code Sync
        description: "Synchronize code snippets in documentation using AST parsing"
        entry: uv run python -m mkdocs_plugins.code_sync
        language: python
        pass_filenames: false
        always_run: true
        args: ["docs", "--base-path", "."]

      - id: generate-fixture-diagrams
        name: Generate fixture diagrams
        description: "Generate fixture diagrams when test fixture code changes"
        entry: uv run python -m mkdocs_plugins.diagrams
        language: python
        pass_filenames: false
        files: "(tests/conftest.py|tests/utils/.*|mkdocs_plugins/diagrams/.*\\.py)$"
        always_run: false
        additional_dependencies: ["graphviz", "pyyaml"]

      - id: validate-html
        name: validate html against w3c standards
        stages: [pre-commit]
        language: system
        entry: uv run python scripts/pre_commit_validations/validate_html.py
        types: [html]
        pass_filenames: true
        always_run: false

      - id: validate-markdown-links
        name: validate markdown links
        description: "Check that all markdown links resolve to existing files"
        stages: [pre-commit]
        language: system
        entry: uv run python scripts/pre_commit_validations/validate_markdown_links.py
        types: [markdown]
        pass_filenames: true
        always_run: false

  # ============================================================
  # PHASE 5: Tests & stats collection (MUST be last)
  # ============================================================
  - repo: local
    hooks:
      - id: pytest-results
        name: pytest (results capture)
        description: "Run full pytest suite and capture results for stats"
        stages: [pre-commit]
        language: system
        entry: bash -c 'ENVIRONMENT=testing uv run pytest --tb=short --json-report --json-report-file=/tmp/ichrisbirch-pytest-report.json --cov=ichrisbirch --cov-report=json:.coverage.json; rc=$?; uv run python -m stats.collect_report pytest; exit $rc'
        types: [python]
        pass_filenames: false
        always_run: false

      - id: devstats-collect
        name: devstats collect
        stages: [post-commit]
        language: system
        entry: uv run python -m stats.post_commit_collect
        pass_filenames: false
        always_run: true

# Application services for blue/green deployment
#
# Deployed as either icb-blue or icb-green project alongside icb-infra.
# Traefik routing is handled by the file provider (routing.yml), not Docker labels.
#
# Usage:
#   DEPLOY_COLOR=blue docker compose --project-name icb-blue -f docker-compose.app.yml up -d
#   DEPLOY_COLOR=green docker compose --project-name icb-green -f docker-compose.app.yml up -d
#
# Required env vars: DEPLOY_COLOR (blue|green), plus all vars from .env

# Shared image reference - only the api service builds this image,
# other services reference it by tag. This avoids a BuildKit race condition
# where parallel builds of the same tag collide (moby/buildkit#6477).
x-app-image: &app-image
  image: ichrisbirch:${DEPLOY_COLOR}

x-logging: &logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # FastAPI Backend Service — builds the shared Python image
  api:
    <<: *app-image
    build:
      context: .
      target: production
    container_name: icb-${DEPLOY_COLOR}-api
    command: uvicorn ichrisbirch.wsgi_api:api --host 0.0.0.0 --port 8000 --workers 4 --no-access-log
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - FASTAPI_DEBUG=False
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_COLORS=${LOG_COLORS:-false}
      - LOG_FILE=/var/log/ichrisbirch/api.log
    ports: []
    volumes:
      - ichrisbirch_logs:/var/log/ichrisbirch
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    working_dir: /app
    logging:
      <<: *logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "${DEPLOY_COLOR}-api"
    labels:
      - "traefik.enable=false"
    networks:
      - proxy
      - icb-infra

  # Vue Frontend Service (Caddy serves built SPA assets)
  vue:
    image: ichrisbirch-vue:${DEPLOY_COLOR}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: "/api"
    container_name: icb-${DEPLOY_COLOR}-vue
    ports: []
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    logging:
      <<: *logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "${DEPLOY_COLOR}-vue"
    labels:
      - "traefik.enable=false"
    networks:
      - proxy
      - icb-infra

  # Chat Service (Streamlit)
  chat:
    <<: *app-image
    container_name: icb-${DEPLOY_COLOR}-chat
    depends_on:
      - api
    command: streamlit run ichrisbirch/chat/app.py --server.address=0.0.0.0 --server.port=8505 --server.headless=true
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_COLORS=${LOG_COLORS:-false}
      - LOG_FILE=/var/log/ichrisbirch/chat.log
    ports: []
    volumes:
      - ichrisbirch_logs:/var/log/ichrisbirch
    restart: always
    healthcheck:
      disable: true
    working_dir: /app
    logging:
      <<: *logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "${DEPLOY_COLOR}-chat"
    labels:
      - "traefik.enable=false"
    networks:
      - proxy
      - icb-infra

  # Scheduler Service (APScheduler background jobs)
  scheduler:
    <<: *app-image
    container_name: icb-${DEPLOY_COLOR}-scheduler
    depends_on:
      - api
    command: python -m ichrisbirch.wsgi_scheduler
    env_file: .env
    environment:
      - ENVIRONMENT=production
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_COLORS=${LOG_COLORS:-false}
      - LOG_FILE=/var/log/ichrisbirch/scheduler.log
    volumes:
      - ichrisbirch_logs:/var/log/ichrisbirch
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    healthcheck:
      disable: true
    working_dir: /app
    logging:
      <<: *logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "${DEPLOY_COLOR}-scheduler"
    networks:
      - icb-infra

  # MCP Server (FastMCP Streamable HTTP)
  mcp:
    <<: *app-image
    container_name: icb-${DEPLOY_COLOR}-mcp
    depends_on:
      - api
    command: python -m ichrisbirch.mcp
    env_file: .env
    environment:
      - MCP_TRANSPORT=streamable-http
      - ICHRISBIRCH_API_URL=http://api:8000
      - ICHRISBIRCH_API_TOKEN=${ICHRISBIRCH_MCP_TOKEN}
      - MCP_PORT=3000
      - ENVIRONMENT=production
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports: []
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/mcp"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    working_dir: /app
    logging:
      <<: *logging
      options:
        max-size: "10m"
        max-file: "3"
        tag: "${DEPLOY_COLOR}-mcp"
    labels:
      - "traefik.enable=false"
    networks:
      - proxy
      - icb-infra

# Shared log volume (same as infra)
volumes:
  ichrisbirch_logs:
    name: icb-prod-logs
    driver: local

# Connect to infrastructure networks
networks:
  proxy:
    external: true
  icb-infra:
    name: icb-infra_default
    external: true

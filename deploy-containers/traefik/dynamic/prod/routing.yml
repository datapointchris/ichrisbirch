# Traefik routing for blue/green deployment
#
# This file is generated by the deploy script (scripts/deploy-homelab.sh).
# DO NOT EDIT MANUALLY — changes will be overwritten on next deploy.
#
# Traefik watches this file and hot-reloads routing within 1-2 seconds.
# Switching traffic between blue/green = regenerating this file with the new color.
#
# Active color: blue

http:
  routers:
    # Direct API access (for MCP tools, services using JWT/API keys)
    api:
      rule: "Host(`api.ichrisbirch.com`)"
      service: api
      middlewares:
        - cors-prod@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Same-origin API proxy for Vue frontend
    # Requests to ichrisbirch.com/api/* get Remote-User headers from Authelia,
    # then the /api prefix is stripped before reaching FastAPI.
    api-proxy:
      rule: "Host(`ichrisbirch.com`) && PathPrefix(`/api`)"
      service: api
      priority: 200
      middlewares:
        - strip-api-prefix@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Vue SPA — migrated pages served at higher priority
    vue-paths:
      rule: "Host(`ichrisbirch.com`) && (PathPrefix(`/countdowns`) || PathPrefix(`/durations`) || PathPrefix(`/events`) || PathPrefix(`/books`) || PathPrefix(`/autotasks`) || PathPrefix(`/money-wasted`) || PathPrefix(`/articles`) || PathPrefix(`/habits`) || PathPrefix(`/box-packing`) || PathPrefix(`/tasks`) || PathPrefix(`/profile`) || PathPrefix(`/admin`) || PathPrefix(`/dashboard`) || PathPrefix(`/fonts`) || PathPrefix(`/assets`) || Path(`/`))"
      service: vue
      priority: 100
      middlewares:
        - cors-prod@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Vue SPA — www subdomain
    vue-paths-www:
      rule: "Host(`www.ichrisbirch.com`) && (PathPrefix(`/countdowns`) || PathPrefix(`/durations`) || PathPrefix(`/events`) || PathPrefix(`/books`) || PathPrefix(`/autotasks`) || PathPrefix(`/money-wasted`) || PathPrefix(`/articles`) || PathPrefix(`/habits`) || PathPrefix(`/box-packing`) || PathPrefix(`/tasks`) || PathPrefix(`/profile`) || PathPrefix(`/admin`) || PathPrefix(`/dashboard`) || PathPrefix(`/fonts`) || PathPrefix(`/assets`) || Path(`/`))"
      service: vue
      priority: 100
      middlewares:
        - cors-prod@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Flask legacy frontend (catch-all at lower priority)
    app:
      rule: "Host(`ichrisbirch.com`) || Host(`www.ichrisbirch.com`)"
      service: app
      priority: 50
      middlewares:
        - cors-prod@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Chat (Streamlit) — dedicated subdomain
    chat:
      rule: "Host(`chat.ichrisbirch.com`)"
      service: chat
      middlewares:
        - cors-prod@file
      entrypoints:
        - web

  services:
    api:
      loadBalancer:
        servers:
          - url: "http://icb-blue-api:8000"
    vue:
      loadBalancer:
        servers:
          - url: "http://icb-blue-vue:80"
    app:
      loadBalancer:
        servers:
          - url: "http://icb-blue-app:5000"
    chat:
      loadBalancer:
        servers:
          - url: "http://icb-blue-chat:8505"
        sticky:
          cookie:
            name: chat-prod-session

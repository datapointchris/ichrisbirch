# Traefik routers for production
#
# All routing rules live here (file provider), not in Docker Compose labels.
# Service definitions (which color to route to) live in services.yml,
# generated by the deploy script. Traefik merges both files automatically.
#
# The PathPrefix list in vue-paths is generated — edit vue-paths.txt and run
# `ich routing generate` instead of modifying this file directly.

http:
  routers:
    # Direct API access (for MCP tools, services using JWT/API keys)
    api:
      rule: "Host(`api.ichrisbirch.com`)"
      service: api
      middlewares:
        - cors-prod@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Same-origin API proxy for Vue frontend
    # Requests to ichrisbirch.com/api/* get Remote-User headers from Authelia,
    # then the /api prefix is stripped before reaching FastAPI.
    api-proxy:
      rule: "Host(`ichrisbirch.com`) && PathPrefix(`/api`)"
      service: api
      priority: 200
      middlewares:
        - strip-api-prefix@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Vue SPA — migrated pages served at higher priority
    vue-paths:
      rule: "Host(`ichrisbirch.com`) && (PathPrefix(`/countdowns`) || PathPrefix(`/durations`) || PathPrefix(`/events`) || PathPrefix(`/books`) || PathPrefix(`/coffee/shops`) || PathPrefix(`/coffee/beans`) || PathPrefix(`/autotasks`) || PathPrefix(`/money-wasted`) || PathPrefix(`/articles`) || PathPrefix(`/habits`) || PathPrefix(`/box-packing`) || PathPrefix(`/projects`) || PathPrefix(`/tasks`) || PathPrefix(`/profile`) || PathPrefix(`/admin`) || PathPrefix(`/dashboard`) || PathPrefix(`/fonts`) || PathPrefix(`/assets`) || Path(`/`))"
      service: vue
      priority: 100
      middlewares:
        - cors-prod@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Vue SPA — www subdomain
    vue-paths-www:
      rule: "Host(`www.ichrisbirch.com`) && (PathPrefix(`/countdowns`) || PathPrefix(`/durations`) || PathPrefix(`/events`) || PathPrefix(`/books`) || PathPrefix(`/coffee/shops`) || PathPrefix(`/coffee/beans`) || PathPrefix(`/autotasks`) || PathPrefix(`/money-wasted`) || PathPrefix(`/articles`) || PathPrefix(`/habits`) || PathPrefix(`/box-packing`) || PathPrefix(`/projects`) || PathPrefix(`/tasks`) || PathPrefix(`/profile`) || PathPrefix(`/admin`) || PathPrefix(`/dashboard`) || PathPrefix(`/fonts`) || PathPrefix(`/assets`) || Path(`/`))"
      service: vue
      priority: 100
      middlewares:
        - cors-prod@file
        - security-headers-prod@file
        - rate-limit-prod@file
      entrypoints:
        - web

    # Chat (Streamlit) — dedicated subdomain
    chat:
      rule: "Host(`chat.ichrisbirch.com`)"
      service: chat
      middlewares:
        - cors-prod@file
      entrypoints:
        - web

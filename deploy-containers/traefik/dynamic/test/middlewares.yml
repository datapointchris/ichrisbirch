# Traefik middlewares for test environment
#
# CORS and security are separate middlewares — CORS fields belong in cors-test
# only, not in security-headers-test. This prevents conflicting CORS settings
# when both middlewares are applied to the same router.
#
# Origins include :8443 because test Traefik maps 8443:443 (non-standard port),
# so browsers send Origin with the port included.

http:
  middlewares:
    # CORS — allow methods, headers, and origins for cross-origin Vue→API calls
    cors-test:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlAllowOriginList:
          - "https://api.test.localhost:8443"
          - "https://app.test.localhost:8443"
          - "https://chat.test.localhost:8443"
          - "https://dashboard.test.localhost:8443"
        accessControlAllowHeaders:
          - "Accept"
          - "Accept-Language"
          - "Content-Language"
          - "Content-Type"
          - "Authorization"
          - "X-Requested-With"
          - "X-Request-ID"
          - "X-User-ID"
          - "X-Application-ID"
          - "X-Internal-Service"
          - "X-Service-Key"
        accessControlExposeHeaders:
          - "Content-Length"
          - "Content-Type"
          - "Location"
          - "X-Total-Count"
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400
        addVaryHeader: true

    # Security headers — stricter than dev (CSP, Permissions-Policy)
    security-headers-test:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
          Referrer-Policy: "strict-origin-when-cross-origin"
          X-Environment: "testing"
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.test.localhost:8443 wss: ws:; font-src 'self' data:;"
          Permissions-Policy: "geolocation=(), microphone=(), camera=()"

    # WebSocket support for Streamlit chat service
    websocket-test:
      headers:
        customRequestHeaders:
          Connection: "upgrade"
          Upgrade: "websocket"
          Sec-WebSocket-Extensions: ""
          Sec-WebSocket-Key: ""
          Sec-WebSocket-Version: ""

    # Rate limiting (permissive for test)
    rate-limit-test:
      rateLimit:
        average: 200
        burst: 500
        period: 1s

    # Simulate Authelia ForwardAuth headers for test (regular user)
    test-authelia-sim:
      headers:
        customRequestHeaders:
          Remote-User: "user@icb.com"
          Remote-Email: "user@icb.com"

    # Simulate Authelia ForwardAuth headers for admin routes in test
    # Applied to a separate higher-priority router matching /admin/* paths.
    test-authelia-sim-admin:
      headers:
        customRequestHeaders:
          Remote-User: "admin@icb.com"
          Remote-Email: "admin@icb.com"

    # Dashboard auth (test environment)
    dashboard-auth-test:
      basicAuth:
        users:
          - "test:$2y$10$Q7B5K8L2M3N4O5P6Q7R8SeTgUvWxYz0123456789ABCDEFabcdef"

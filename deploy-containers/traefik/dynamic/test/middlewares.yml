http:
  middlewares:
    # Security headers middleware for test environment
    # Origins include :8443 because test Traefik maps 8443:443 (non-standard port),
    # so browsers send Origin with the port included.
    security-headers-test:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlAllowOriginList:
          - "https://api.test.localhost:8443"
          - "https://app.test.localhost:8443"
          - "https://chat.test.localhost:8443"
          - "https://dashboard.test.localhost:8443"
        accessControlAllowHeaders:
          - "*"
        accessControlExposeHeaders:
          - "*"
        accessControlAllowCredentials: true
        accessControlMaxAge: 100
        addVaryHeader: true
        # Security headers
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Frame-Options: "DENY"
          X-Content-Type-Options: "nosniff"
          X-XSS-Protection: "1; mode=block"
          Referrer-Policy: "strict-origin-when-cross-origin"
          X-Environment: "testing"
          # Content Security Policy for test environment
          # connect-src includes api.test.localhost:8443 for cross-origin Vue→API calls
          Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.test.localhost:8443 wss: ws:; font-src 'self' data:;"
          # Permissions Policy
          Permissions-Policy: "geolocation=(), microphone=(), camera=()"

    # CORS middleware for test environment
    # Origins include :8443 because test Traefik maps 8443:443 (non-standard port),
    # so browsers send Origin with the port included.
    cors-test:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlAllowOriginList:
          - "https://api.test.localhost:8443"
          - "https://app.test.localhost:8443"
          - "https://chat.test.localhost:8443"
          - "https://dashboard.test.localhost:8443"
        accessControlAllowHeaders:
          - "Accept"
          - "Accept-Language"
          - "Content-Language"
          - "Content-Type"
          - "Authorization"
          - "X-Requested-With"
          - "X-Request-ID"
          - "X-User-ID"
          - "X-Application-ID"
          - "X-Internal-Service"
          - "X-Service-Key"
        accessControlExposeHeaders:
          - "Content-Length"
          - "Content-Type"
          - "Location"
          - "X-Total-Count"
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400
        addVaryHeader: true

    # WebSocket support for Streamlit chat service
    websocket-test:
      headers:
        customRequestHeaders:
          Connection: "upgrade"
          Upgrade: "websocket"
          Sec-WebSocket-Extensions: ""
          Sec-WebSocket-Key: ""
          Sec-WebSocket-Version: ""

    # Rate limiting for test environment (more permissive)
    rate-limit-test:
      rateLimit:
        average: 200  # 200 requests per second
        burst: 500    # Allow bursts up to 500
        period: 1s

    # Simulate Authelia ForwardAuth headers for test
    # In production, Authelia injects Remote-User/Remote-Email via ForwardAuth.
    # In test, this middleware fakes those headers so Vue can call the API without
    # running a full Authelia instance (mirrors dev-authelia-sim).
    test-authelia-sim:
      headers:
        customRequestHeaders:
          Remote-User: "user@icb.com"
          Remote-Email: "user@icb.com"

    # Auth middleware for dashboard access (test environment)
    dashboard-auth-test:
      basicAuth:
        users:
          - "test:$2y$10$Q7B5K8L2M3N4O5P6Q7R8SeTgUvWxYz0123456789ABCDEFabcdef"  # test:testpass

http:
  middlewares:
    # Development-specific middleware
    dev-cors:
      headers:
        accessControlAllowOriginList:
          - "https://app.docker.localhost"
          - "https://api.docker.localhost"
          - "https://chat.docker.localhost"
          - "http://localhost:3000"  # For frontend dev servers
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
          - "PATCH"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "Accept"
          - "X-Request-ID"
          - "X-Application-ID"
          - "X-User-ID"
          - "X-Service-Key"
        accessControlAllowCredentials: true

    # Aliased middlewares for compatibility with base compose file
    cors-prod:
      headers:
        accessControlAllowOriginList:
          - "https://app.docker.localhost"
          - "https://api.docker.localhost"
          - "https://chat.docker.localhost"
          - "http://localhost:3000"  # For frontend dev servers
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "OPTIONS"
          - "PATCH"
        accessControlAllowHeaders:
          - "Content-Type"
          - "Authorization"
          - "Accept"
          - "X-Request-ID"
          - "X-Application-ID"
          - "X-User-ID"
          - "X-Service-Key"
        accessControlAllowCredentials: true

    security-headers-prod:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"  # More relaxed for dev
          X-Content-Type-Options: "nosniff"
        sslRedirect: true

    rate-limit-prod:
      rateLimit:
        burst: 1000  # More generous for dev
        average: 500

    websocket-prod:
      headers:
        customRequestHeaders:
          Connection: "upgrade"
          Upgrade: "websocket"

    # Relaxed security for development
    dev-security:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"  # More relaxed for dev
          X-Content-Type-Options: "nosniff"
        sslRedirect: true

    # Development debugging headers
    dev-debug:
      headers:
        customResponseHeaders:
          X-Debug-Mode: "true"
          X-Environment: "development"

    # Simulate Authelia ForwardAuth headers for dev
    # In production, Authelia injects Remote-User/Remote-Email via ForwardAuth.
    # In dev, this middleware fakes those headers so Vue can call the API without
    # running a full Authelia instance.
    dev-authelia-sim:
      headers:
        customRequestHeaders:
          Remote-User: "user@icb.com"
          Remote-Email: "user@icb.com"

    # WebSocket support for Streamlit
    websocket-headers:
      headers:
        customRequestHeaders:
          Connection: "upgrade"
          Upgrade: "websocket"

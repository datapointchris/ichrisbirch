# Traefik middlewares for development environment
#
# CORS and security are separate middlewares — CORS fields belong in dev-cors
# only, not in dev-security. This prevents conflicting CORS settings when both
# middlewares are applied to the same router.

http:
  middlewares:
    # CORS — allow methods, headers, and origins for cross-origin Vue→API calls
    dev-cors:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlAllowOriginList:
          - "https://app.docker.localhost"
          - "https://api.docker.localhost"
          - "https://chat.docker.localhost"
          - "http://localhost:3000"
        accessControlAllowHeaders:
          - "Accept"
          - "Accept-Language"
          - "Content-Language"
          - "Content-Type"
          - "Authorization"
          - "X-Requested-With"
          - "X-Request-ID"
          - "X-User-ID"
          - "X-Application-ID"
          - "X-Internal-Service"
          - "X-Service-Key"
        accessControlExposeHeaders:
          - "Content-Length"
          - "Content-Type"
          - "Location"
          - "X-Total-Count"
        accessControlAllowCredentials: true
        accessControlMaxAge: 86400
        addVaryHeader: true

    # Security headers — relaxed for development (no HSTS, no CSP)
    dev-security:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Frame-Options: "SAMEORIGIN"
          X-Content-Type-Options: "nosniff"
          X-Environment: "development"

    # Simulate Authelia ForwardAuth headers for dev
    # In production, Authelia injects Remote-User/Remote-Email via ForwardAuth.
    # In dev, this middleware fakes those headers so Vue can call the API without
    # running a full Authelia instance.
    dev-authelia-sim:
      headers:
        customRequestHeaders:
          Remote-User: "admin@icb.com"
          Remote-Email: "admin@icb.com"

# Infrastructure services for blue/green deployment
#
# These services are always running and never restarted during code deploys.
# App services (API, App, Vue, Chat, Scheduler) are in docker-compose.app.yml
# and deployed as separate blue/green projects.
#
# Usage:
#   docker compose --project-name icb-infra -f docker-compose.infra.yml up -d

services:
  # Traefik reverse proxy - receives HTTP from Cloudflare Tunnel
  # Routes traffic to blue or green app containers via file provider (routing.yml)
  # Note: v3.6+ required for Docker 29+ API compatibility (auto-negotiation)
  traefik:
    image: traefik:v3.6
    container_name: icb-infra-traefik
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy-containers/traefik/dynamic/prod:/etc/traefik/dynamic:ro
    command:
      - --ping=true
      - --api=false
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=proxy
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --log.level=INFO
    networks:
      - proxy
      - default
    restart: always
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "traefik"

  # PostgreSQL Database Service - Production optimized for performance and reliability
  postgres:
    image: postgres:16-alpine
    container_name: icb-infra-postgres
    environment:
      - POSTGRES_DB=ichrisbirch
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports: []
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=100
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ichrisbirch"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "postgres"

  # Redis Cache Service - Production optimized for performance and persistence
  redis:
    image: redis:7-alpine
    container_name: icb-infra-redis
    ports: []
    networks:
      - default
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --rdbcompression yes
      --rdbchecksum yes
      --appendonly yes
      --appendfsync everysec
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "redis"

# Reuse existing named volumes (same data, no migration needed)
volumes:
  postgres_data:
    name: icb-prod-postgres-data
    driver: local
  redis_data:
    name: icb-prod-redis-data
    driver: local

# Networks for service communication
# The 'default' network (icb-infra_default) is used by app containers to reach postgres/redis
# The 'proxy' network is shared with app containers for Traefik routing
networks:
  default:
    driver: bridge
  proxy:
    external: true

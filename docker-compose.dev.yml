# Dev overrides — only what differs from base (docker-compose.yml)
# Verify merged result: ich dev docker config

x-app-build: &app-build
  image: ichrisbirch:development
  build:
    context: .
    target: development

services:
  traefik:
    container_name: icb-dev-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports: !override
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes: !override
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy-containers/traefik/certs/dev.crt:/certs/tls.crt:ro
      - ./deploy-containers/traefik/certs/dev.key:/certs/tls.key:ro
      - ./deploy-containers/traefik/dynamic/dev:/etc/traefik/dynamic:ro
    command:
      - "--ping=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=icb-dev-proxy"
      - "--providers.docker.constraints=Label(`traefik.environment`,`development`)"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--metrics.prometheus=true"
    labels:
      - "traefik.environment=development"
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.docker.localhost`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "traefik-dev"

  postgres:
    container_name: icb-dev-postgres
    environment: !override
      - POSTGRES_DB=ichrisbirch
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports: !override
      - "5432:5432"
    command: >
      postgres
      -c log_destination=stderr
      -c shared_preload_libraries=pg_stat_statements
      -c max_connections=200
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ichrisbirch"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "postgres-dev"

  redis:
    container_name: icb-dev-redis
    ports: !override
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel notice --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment: !override []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "redis-dev"

  api:
    <<: *app-build
    container_name: icb-dev-api
    command: uvicorn ichrisbirch.wsgi_api:api --host 0.0.0.0 --port 8000 --reload --reload-dir ichrisbirch/api --reload-dir ichrisbirch/models --reload-dir ichrisbirch/schemas --log-level debug --no-access-log
    environment: !override
      - ENVIRONMENT=development
      - FASTAPI_DEBUG=True
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - LOG_COLORS=${LOG_COLORS:-true}
      - LOG_FILE=/var/log/ichrisbirch/api.log
    ports: !override
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    volumes: !override
      - .:/app
      - /app/.venv
      - ichrisbirch_logs:/var/log/ichrisbirch
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels: !override
      - "traefik.environment=development"
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "api-dev"

  chat:
    <<: *app-build
    container_name: icb-dev-chat
    command: streamlit run ichrisbirch/chat/app.py --server.address=0.0.0.0 --server.port=8505 --server.runOnSave=true --server.headless=true
    environment: !override
      - ENVIRONMENT=development
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - LOG_COLORS=${LOG_COLORS:-true}
      - LOG_FILE=/var/log/ichrisbirch/chat.log
    ports: !override
      - "8505:8505"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8505/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    volumes: !override
      - .:/app
      - /app/.venv
      - ichrisbirch_logs:/var/log/ichrisbirch
    labels: !override
      - "traefik.environment=development"
      - "traefik.enable=true"
      - "traefik.http.services.chat.loadbalancer.server.port=8505"
      - "traefik.http.services.chat.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.chat.loadbalancer.sticky.cookie.name=streamlit-session"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "chat-dev"

  # !reset clears the inherited build: key from docker-compose.yml (prod Vue builds
  # a Caddy image from frontend/Dockerfile). Without this, `docker compose build`
  # tags the Caddy build output as node:20-alpine, corrupting the base image.
  vue:
    image: node:20-alpine
    build: !reset null
    container_name: icb-dev-vue
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment: !override
      - VITE_API_URL=https://api.docker.localhost
    ports: !override
      - "5173:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    volumes: !override
      - ./frontend:/app
      - vue_node_modules:/app/node_modules
    labels: !override
      - "traefik.environment=development"
      - "traefik.enable=true"
      - "traefik.http.services.vue.loadbalancer.server.port=5173"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "vue-dev"

  scheduler:
    <<: *app-build
    container_name: icb-dev-scheduler
    environment: !override
      - ENVIRONMENT=development
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - LOG_COLORS=${LOG_COLORS:-true}
      - LOG_FILE=/var/log/ichrisbirch/scheduler.log
    restart: unless-stopped
    volumes: !override
      - .:/app
      - /app/.venv
      - ichrisbirch_logs:/var/log/ichrisbirch
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "scheduler-dev"

# Dev volumes — override base names to isolate from prod
volumes:
  postgres_data:
    name: icb-dev-postgres-data
    driver: local
  redis_data:
    name: icb-dev-redis-data
    driver: local
  ichrisbirch_logs:
    name: icb-dev-logs
    driver: local
  vue_node_modules:
    name: icb-dev-vue-node-modules
    driver: local

networks:
  proxy:
    name: icb-dev-proxy
    external: false
    driver: bridge
  default:
    driver: bridge

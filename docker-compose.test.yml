# Test overrides — only what differs from base (docker-compose.yml)
# Verify merged result: ich testing docker config

x-app-build: &app-build
  image: ichrisbirch:testing
  build:
    context: .
    target: testing

services:
  # Note: v3.6+ required for Docker 29+ API compatibility (auto-negotiation)
  traefik:
    container_name: icb-test-traefik
    command:
      - "--ping=true"
      - "--api.dashboard=true"
      - "--api.debug=true"
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=icb-test-proxy"
      - "--providers.docker.constraints=Label(`traefik.environment`,`testing`)"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.http.tls.domains[0].main=*.test.localhost"
    ports: !override
      - "9080:80"
      - "8443:443"
      - "9082:8080"
    volumes: !override
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy-containers/traefik/dynamic/test:/etc/traefik/dynamic:ro
      - ./deploy-containers/traefik/certs:/etc/ssl/certs:ro
    restart: unless-stopped
    labels:
      - "traefik.environment=testing"
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-test.rule=Host(`dashboard.test.localhost`)"
      - "traefik.http.routers.dashboard-test.entrypoints=websecure"
      - "traefik.http.routers.dashboard-test.tls=true"
      - "traefik.http.routers.dashboard-test.tls.options=test@file"
      - "traefik.http.routers.dashboard-test.service=api@internal"
      - "traefik.http.routers.dashboard-test.middlewares=dashboard-auth-test@file"
    environment:
      - TRAEFIK_API_DASHBOARD=true
      - TRAEFIK_API_DEBUG=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "traefik-test"

  # Test database — tmpfs for speed, durability disabled
  postgres:
    container_name: icb-test-postgres
    ports: !override
      - "5434:5432"
    environment: !override
      - POSTGRES_DB=ichrisbirch
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - PGDATA=/tmp/postgres
    tmpfs:
      - /tmp/postgres
    volumes: !override []
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ichrisbirch"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
      -c max_connections=100
      -c shared_buffers=128MB
      -c max_wal_size=2GB
      -c checkpoint_completion_target=0.9
      -c log_destination=stderr
      -c logging_collector=off
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "postgres-test"

  # Test Redis — no persistence
  redis:
    container_name: icb-test-redis
    ports: !override
      - "6380:6379"
    command: >
      redis-server
      --save ""
      --appendonly no
      --loglevel warning
    environment: !override []
    volumes: !override []
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "redis-test"

  api:
    <<: *app-build
    container_name: icb-test-api
    command: >
      uvicorn ichrisbirch.wsgi_api:api
      --host 0.0.0.0
      --port 8000
      --log-level debug
      --no-access-log
    ports: !override
      - "8001:8000"
    environment: !override
      - ENVIRONMENT=testing
      - FASTAPI_DEBUG=False
      - FASTAPI_TESTING=True
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - LOG_COLORS=${LOG_COLORS:-true}
      - LOG_FILE=/var/log/ichrisbirch/api.log
    volumes: !override
      - .:/app
      - /app/.venv
      - ichrisbirch_logs:/var/log/ichrisbirch
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      start_period: 60s
      retries: 5
    labels: !override
      - "traefik.environment=testing"
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "api-test"

  chat:
    <<: *app-build
    container_name: icb-test-chat
    command: >
      streamlit run ichrisbirch/chat/app.py
      --server.address=0.0.0.0
      --server.port=8505
      --server.headless=true
    environment: !override
      - ENVIRONMENT=testing
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - LOG_COLORS=${LOG_COLORS:-true}
      - LOG_FILE=/var/log/ichrisbirch/chat.log
    ports: !override
      - "8507:8505"
    volumes: !override
      - .:/app
      - /app/.venv
      - ichrisbirch_logs:/var/log/ichrisbirch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8505/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels: !override
      - "traefik.environment=testing"
      - "traefik.enable=true"
      - "traefik.http.services.chat.loadbalancer.server.port=8505"
      - "traefik.http.services.chat.loadbalancer.sticky.cookie=true"
      - "traefik.http.services.chat.loadbalancer.sticky.cookie.name=chat-test-session"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "chat-test"

  scheduler:
    <<: *app-build
    container_name: icb-test-scheduler
    command: python -m ichrisbirch.wsgi_scheduler
    environment: !override
      - ENVIRONMENT=testing
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - LOG_COLORS=${LOG_COLORS:-true}
      - LOG_FILE=/var/log/ichrisbirch/scheduler.log
    volumes: !override
      - .:/app
      - /app/.venv
      - ichrisbirch_logs:/var/log/ichrisbirch
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "scheduler-test"

  # Vue dev server — completely replaces prod Caddy build
  vue:
    image: node:20-alpine
    build: !reset null
    container_name: icb-test-vue
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment: !override
      - VITE_API_URL=https://api.test.localhost:8443
    ports: !override
      - "5174:5173"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    volumes: !override
      - ./frontend:/app
      - vue_test_node_modules:/app/node_modules
    labels: !override
      - "traefik.environment=testing"
      - "traefik.enable=true"
      - "traefik.http.services.vue.loadbalancer.server.port=5173"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "vue-test"

# Test volumes — override base names to isolate from prod/dev
# .venv is an anonymous volume on api/chat/scheduler (matches dev pattern) —
# Docker seeds it from the image layer on every new container, so rebuilding
# the image always produces a fresh venv. A named volume would persist stale
# contents across rebuilds and break runtime package resolution.
volumes:
  postgres_data:
    name: icb-test-postgres-data
    driver: local
  redis_data:
    name: icb-test-redis-data
    driver: local
  ichrisbirch_logs:
    name: icb-test-logs
    driver: local
  vue_test_node_modules:
    name: icb-test-vue-node-modules
    driver: local

networks:
  proxy:
    name: icb-test-proxy
    external: false
    driver: bridge
  default:
    driver: bridge
